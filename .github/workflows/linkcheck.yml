name: Link Check

on:
  push:
    branches: [master]
  schedule:
    - cron: '23 6 * * 1'   # weekly, Mondays 06:23 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    name: Lychee link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-redirects 5
            --timeout 20
            './**/*.html'
            './**/*.md'
          fail: true
